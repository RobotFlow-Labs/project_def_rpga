[project]
name = "anima-def-rpga"
codename = "DEF-RPGA"
package_name = "anima_def_rpga"
functional_name = "DEF-RPGA"
wave = 7
paper_title = "3D Gaussian Splatting Driven Multi-View Robust Physical Adversarial Camouflage Generation"
paper_arxiv = "2507.01367"
paper_pdf = "papers/2507.01367_PGA.pdf"
stale_paper_pdf = "papers/2503.16190_PGA-Camouflage.pdf"
upstream_repo = "https://github.com/TRLou/R-PGA"

[compute]
backend = "auto"
precision = "fp32"
python = "3.11"

[data]
shared_volume = "/Volumes/AIFlowDev/RobotFlowLabs/datasets"
repos_volume = "/Volumes/AIFlowDev/RobotFlowLabs/repos/wave7"
datasets_root = "/Volumes/AIFlowDev/RobotFlowLabs/datasets/datasets/def_rpga"
models_root = "/Volumes/AIFlowDev/RobotFlowLabs/datasets/models/def_rpga"
exports_root = "./outputs"

[hardware]
zed2i = true
unitree_l2_lidar = true
cobot_xarm6 = false

[detectors]
default = "faster-rcnn"
faster_rcnn_checkpoint = "/Volumes/AIFlowDev/RobotFlowLabs/datasets/models/def_rpga/detectors/faster_rcnn_r50_fpn_1x_coco.pth"
sam_checkpoint = "/Volumes/AIFlowDev/RobotFlowLabs/datasets/models/def_rpga/sam/sam_vit_h.pth"

[serve]
host = "0.0.0.0"
port = 8407
